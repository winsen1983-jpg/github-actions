name: multi-job

on: 
    push:
        branches:
            - main
    pull_request:
        branches:
            - main

jobs:
    job1:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v7
            - name: Run job 1
              run: echo "This is job 1"

    job2:
        runs-on: ubuntu-latest
        needs: job1
        steps:
            - name: Checkout code
              uses: actions/checkout@v7
            - name: Run job 2
              run: echo "This is job 2"

    job3:
        runs-on: ubuntu-latest
        needs: job2
        if: success()
        steps:
            - name: Checkout code
              uses: actions/checkout@v7

            - name: Run job 3
              run: echo "This is job 3"

            - name: Set up Python
              uses: actions/setup-python@v6
              with:
               python-version: 3.14

            - name: Verify python version
              run: python --version